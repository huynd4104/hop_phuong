<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Noise & Thai giáo - Momcare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { DEFAULT: '#C98C7B', hover: '#B67868' },
                        bg: '#1A1817', // Dark mode for sleep
                        card: '#2D2825',
                        surface: '#3D3631',
                        textPrimary: '#F6F1EC',
                        textSecondary: '#9C857C'
                    },
                    fontFamily: { sans: ['Quicksand', 'sans-serif'] },
                }
            }
        }
    </script>
    <style>
        .clay-card {
            transition: all 0.3s ease;
        }

        .sound-wave {
            display: flex;
            align-items: center;
            gap: 4px;
            height: 64px;
        }

        .wave-bar {
            width: 4px;
            background: #C98C7B;
            border-radius: 99px;
            animation: wave 1.2s ease-in-out infinite;
        }

        @keyframes wave {

            0%,
            100% {
                height: 10px;
                opacity: 0.5;
            }

            50% {
                height: 60px;
                opacity: 1;
            }
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body class="bg-bg text-textPrimary font-sans min-h-screen">
    <div class="max-w-[1000px] mx-auto p-4 md:p-10 flex flex-col gap-10">

        <!-- HEADER: DARK THEME -->
        <header
            class="flex flex-col md:flex-row justify-between items-center bg-card rounded-[40px] px-10 py-8 shadow-soft border border-white/5 gap-8">
            <div class="flex items-center gap-6">
                <div
                    class="w-16 h-16 bg-primary/20 text-primary rounded-[24px] flex items-center justify-center shrink-0">
                    <i data-lucide="moon" class="w-8 h-8"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black">Chế độ Ngủ ngon</h1>
                    <p class="text-textSecondary font-bold text-sm">Xoa dịu Bé, thư giãn mẹ</p>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <button class="bg-primary text-white font-black px-8 py-4 rounded-full shadow-btn clay-btn text-sm">
                    Tự động phát khi Bé khóc
                </button>
            </div>
        </header>

        <!-- MAIN PLAYER -->
        <main class="bg-card rounded-[48px] p-10 md:p-16 shadow-soft border border-white/5 flex flex-col items-center">

            <div
                class="w-64 h-64 bg-surface rounded-full flex items-center justify-center mb-10 relative overflow-hidden shadow-inner border-8 border-white/5">
                <img src="https://images.unsplash.com/photo-1544122159-39ed9ef97072?w=400"
                    class="w-full h-full object-cover opacity-50 absolute">
                <div class="sound-wave relative z-10">
                    <div class="wave-bar" style="animation-delay: 0.1s"></div>
                    <div class="wave-bar" style="animation-delay: 0.3s"></div>
                    <div class="wave-bar" style="animation-delay: 0.5s"></div>
                    <div class="wave-bar" style="animation-delay: 0.7s"></div>
                    <div class="wave-bar" style="animation-delay: 0.4s"></div>
                    <div class="wave-bar" style="animation-delay: 0.2s"></div>
                </div>
            </div>

            <h2 class="text-3xl font-black mb-2">Tiếng tim Mẹ</h2>
            <p class="text-textSecondary font-bold mb-10">Mô phỏng nhịp tim thư giãn cho bé sơ sinh</p>

            <!-- PLAYER CONTROLS -->
            <div class="flex items-center gap-10 mb-12">
                <button class="text-textSecondary hover:text-white transition-colors"><i data-lucide="skip-back"
                        class="w-8 h-8"></i></button>
                <button
                    class="w-24 h-24 bg-primary text-white rounded-full flex items-center justify-center shadow-lg hover:scale-110 active:scale-95 transition-all">
                    <i data-lucide="pause" class="w-10 h-10 fill-current"></i>
                </button>
                <button class="text-textSecondary hover:text-white transition-colors"><i data-lucide="skip-forward"
                        class="w-8 h-8"></i></button>
            </div>

            <div class="w-full max-w-[500px] flex flex-col gap-6">
                <div class="flex justify-between items-center text-xs font-black uppercase text-textSecondary px-2">
                    <span>Hẹn giờ</span>
                    <span>45 phút</span>
                </div>
                <div class="w-full h-3 bg-surface rounded-full relative overflow-hidden">
                    <div class="absolute inset-y-0 left-0 bg-primary/40 w-full"></div>
                    <div class="absolute inset-y-0 left-0 bg-primary w-2/3 rounded-full"></div>
                </div>
            </div>
        </main>

        <!-- SOUND LIBRARY: HORIZONTAL -->
        <section class="flex flex-col gap-6">
            <h3 class="text-xl font-black px-4">Thư viện âm thanh</h3>
            <div class="flex overflow-x-auto gap-6 px-4 py-6 hide-scrollbar">

                <div class="w-32 shrink-0 flex flex-col items-center gap-3 clay-card">
                    <div
                        class="w-24 h-24 bg-card rounded-[32px] flex items-center justify-center border-2 border-primary shadow-soft">
                        <i data-lucide="cloud-rain" class="w-8 h-8 text-primary"></i>
                    </div>
                    <span class="text-xs font-black uppercase">Tiếng mưa</span>
                </div>

                <div class="w-32 shrink-0 flex flex-col items-center gap-3 clay-card">
                    <div
                        class="w-24 h-24 bg-card rounded-[32px] flex items-center justify-center border border-white/5 shadow-soft">
                        <i data-lucide="waves" class="w-8 h-8 text-blue-400"></i>
                    </div>
                    <span class="text-xs font-black uppercase">Sóng biển</span>
                </div>

                <div class="w-32 shrink-0 flex flex-col items-center gap-3 clay-card">
                    <div
                        class="w-24 h-24 bg-card rounded-[32px] flex items-center justify-center border border-white/5 shadow-soft">
                        <i data-lucide="wind" class="w-8 h-8 text-green-400"></i>
                    </div>
                    <span class="text-xs font-black uppercase">Rừng xanh</span>
                </div>

                <div class="w-32 shrink-0 flex flex-col items-center gap-3 clay-card">
                    <div
                        class="w-24 h-24 bg-card rounded-[32px] flex items-center justify-center border border-white/5 shadow-soft">
                        <i data-lucide="fan" class="w-8 h-8 text-purple-400"></i>
                    </div>
                    <span class="text-xs font-black uppercase">Máy hút bụi</span>
                </div>

                <div class="w-32 shrink-0 flex flex-col items-center gap-3 clay-card">
                    <div
                        class="w-24 h-24 bg-card rounded-[32px] flex items-center justify-center border border-white/5 shadow-soft">
                        <i data-lucide="mic" class="w-8 h-8 text-orange-400"></i>
                    </div>
                    <span class="text-xs font-black uppercase">Giọng mẹ</span>
                </div>

                <div class="w-8 shrink-0"></div>
            </div>
        </section>

        <!-- FOOTER / HOME BUTTON -->
        <footer class="mt-8 mb-20 flex justify-center">
            <a href="momcare_index.html"
                class="flex items-center justify-center gap-4 py-5 px-12 bg-card text-textPrimary rounded-full shadow-soft font-black hover:-translate-y-1 transition-all border border-white/10">
                <i data-lucide="home" class="w-6 h-6"></i> Quay lại Hub
            </a>
        </footer>

    </div>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
